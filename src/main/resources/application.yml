spring:
  application:
    name: jar-klawz-claude
  datasource:
    url: ${KLAWZ_DB_URL:jdbc:h2:mem:claude-db;DB_CLOSE_DELAY=-1}
    driver-class-name: ${KLAWZ_DB_DRIVER:org.h2.Driver}
    username: ${KLAWZ_DB_USER:sa}
    password: ${KLAWZ_DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:false}
      path: /h2-console
server:
  port: ${PORT:8081}
klawz:
  provider: claude
  claude:
    api-key: ${CLAUDE_API_KEY:}
    model: ${CLAUDE_MODEL:claude-sonnet-4-20250514}
  shell:
    enabled: false

# Maton.ai fleet integration
maton:
  api:
    url: ${MATON_API_URL:}
    key: ${MATON_API_KEY:}
    health:
      path: /health

logging:
  level:
    io.jar.klawz: ${LOG_LEVEL:INFO}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always